<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🤖 AI असिस्टेंट</title>
<style>
    body {
        background: linear-gradient(135deg, #0a0a2a, #000);
        color: white;
        font-family: 'Segoe UI', Arial;
        padding: 20px;
        text-align: center;
    }
    .mic-btn {
        background: #ff44aa;
        color: white;
        border: none;
        padding: 20px 40px;
        border-radius: 60px;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        margin: 20px;
    }
    .chat-area {
        background: #000000aa;
        border-radius: 20px;
        padding: 20px;
        height: 300px;
        overflow-y: auto;
        text-align: left;
        font-family: monospace;
        margin-top: 20px;
    }
    input {
        padding: 12px;
        width: 70%;
        border-radius: 30px;
        border: none;
        background: #333;
        color: white;
    }
    button {
        background: #ffaa44;
        color: #000;
        border: none;
        padding: 12px 24px;
        border-radius: 30px;
        cursor: pointer;
    }
</style>
</head>
<body>
<h1>🤖 AI असिस्टेंट</h1>
<p>🎤 बोलो | 💬 टाइप करो | 🧠 24x7</p>

<button class="mic-btn" id="micBtn" onclick="startVoice()">🎤 बोलें</button>
<div id="voiceStatus" style="margin:10px; color:#ffaa44;">⚡ माइक पर क्लिक करें</div>

<input type="text" id="cmdInput" placeholder="कमांड लिखें... (गोल्ड, क्रिप्टो, न्यूज़, नमस्ते)">
<button onclick="sendCmd()">🚀 भेजें</button>

<div class="chat-area" id="chatArea">
🤖: नमस्ते कमांडर! मैं तुम्हारा AI असिस्टेंट हूँ।<br>
💡: "गोल्ड", "क्रिप्टो", "न्यूज़", "नमस्ते" आज़माओ।
</div>

<script>
    let memory = {};
    let prices = { gold: 72500, btc: 68000, nifty: 23750 };
    
    function addMsg(sender, msg) {
        let area = document.getElementById('chatArea');
        let icon = sender === 'user' ? '🧑' : '🤖';
        area.innerHTML += `<br>${icon}: ${msg}`;
        area.scrollTop = area.scrollHeight;
    }
    
    function sendCmd() {
        let inp = document.getElementById('cmdInput');
        let cmd = inp.value.trim();
        if(cmd) {
            addMsg('user', cmd);
            processCmd(cmd);
            inp.value = '';
        }
    }
    
    function processCmd(cmd) {
        let c = cmd.toLowerCase();
        let resp = "";
        
        if(cmd.includes("सीख") && cmd.includes("=")) {
            let p = cmd.split("=");
            let k = p[0].replace("सीख","").trim();
            let v = p[1].trim();
            memory[k] = v;
            resp = "✅ सीखा: " + k + " = " + v;
        }
        else if(c.includes("याद")) {
            let k = cmd.replace("याद","").trim();
            resp = memory[k] ? "🧠 " + memory[k] : "❓ याद नहीं";
        }
        else if(c.includes("नमस्ते")) resp = "🙏 नमस्ते! कैसे मदद करूँ?";
        else if(c.includes("गोल्ड")) {
            prices.gold += (Math.random() - 0.5) * 200;
            resp = `🥇 गोल्ड: ₹${prices.gold.toFixed(0)} | सुझाव: ${Math.random()>0.5?'BUY':'SELL'}`;
        }
        else if(c.includes("क्रिप्टो")) {
            prices.btc += (Math.random() - 0.5) * 1500;
            resp = `💰 क्रिप्टो: $${prices.btc.toFixed(0)} | ${Math.random()>0.5?'तेजी':'मंदी'}`;
        }
        else if(c.includes("न्यूज़")) resp = "🌍 न्यूज़: Fed ने ब्याज दरें स्थिर रखीं, सितंबर में कटौती की संभावना";
        else resp = "🤔 समझ नहीं आया। 'गोल्ड', 'क्रिप्टो', 'न्यूज़', 'नमस्ते' आज़माओ।";
        
        addMsg('ai', resp);
    }
    
    function startVoice() {
        if(!('webkitSpeechRecognition' in window)) {
            document.getElementById('voiceStatus').innerHTML = "❌ यह ब्राउज़र वॉयस सपोर्ट नहीं करता। Chrome उपयोग करें।";
            return;
        }
        let recog = new webkitSpeechRecognition();
        recog.lang = 'hi-IN';
        recog.onstart = () => document.getElementById('voiceStatus').innerHTML = "🎤 सुन रहा हूँ...";
        recog.onresult = (e) => {
            let text = e.results[0][0].transcript;
            document.getElementById('voiceStatus').innerHTML = `🗣️: ${text}`;
            addMsg('user', text);
            processCmd(text);
        };
        recog.onerror = () => document.getElementById('voiceStatus').innerHTML = "❌ सुनने में समस्या, फिर से try करें";
        recog.start();
    }
    
    document.getElementById('cmdInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendCmd();
    });
</script>
</body>
</html>
